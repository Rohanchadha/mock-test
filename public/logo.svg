<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- GOWN SHAPE -->
  <path d="
    M 50 40
    C 65 37, 83 43, 92 57
    C 99 68, 95 82, 50 95
    C 5 82, 1 68, 8 57
    C 17 43, 35 37, 50 40 Z
  " fill="#1D8A8A"/>

  <!-- HEAD CIRCLE (negative space) -->
  <circle cx="50" cy="28" r="12" fill="white"/>

  <!-- GOLD COLLAR -->
  <path d="
    M 39 41
    C 39 54, 43 61, 50 61
    C 57 61, 61 54, 61 41
    C 57 50, 54 55, 50 55
    C 46 55, 43 50, 39 41 Z
  " fill="#ECA020"/>

  <!-- WHITE CENTER SEAM -->
  <line x1="50" y1="55" x2="50" y2="95" stroke="white" stroke-width="3"/>

  <!-- REDRAW HEAD (ensures clean cutout) -->
  <circle cx="50" cy="28" r="12" fill="white"/>

  <!-- CAP CROWN -->
  <rect x="38" y="9" width="24" height="12" rx="1.5" fill="#1D8A8A"/>

  <!-- CAP BOARD (mortarboard) -->
  <rect x="25" y="1" width="50" height="10" rx="2" fill="#1D8A8A"/>

  <!-- TASSEL -->
  <line x1="74" y1="2" x2="74" y2="14" stroke="#1D8A8A" stroke-width="2" stroke-linecap="round"/>
  <circle cx="74" cy="17" r="3" fill="#1D8A8A"/>
</svg>
